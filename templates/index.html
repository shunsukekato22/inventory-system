<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>在庫管理システム</title>
</head>
<body>
    <h1>📦 在庫一覧</h1>

    {% if inventory %}
        <table border="1">
            <tr>
                <th>商品名</th>
                <th>在庫数</th>
            </tr>
            {% for item, data in inventory.items() %}
            <tr>
                <td>{{ item }}</td>
                <td>{{ data['stock'] }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>商品が登録されていません</p>
    {% endif %}
</body>
</html>
